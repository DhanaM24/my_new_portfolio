<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Career Path Help System">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#121a35"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)"/>
  <circle cx="680" cy="80" r="120" fill="#00d4ff" opacity="0.06"/>
  <circle cx="100" cy="320" r="90" fill="#9d4edd" opacity="0.08"/>
  <!-- Roadmap path -->
  <path d="M120 280 C200 200, 280 320, 360 240 S520 160, 600 200 S720 120, 700 100" fill="none" stroke="url(#accent1)" stroke-width="3" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- Milestone nodes -->
  <circle cx="160" cy="260" r="14" fill="#121a35" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="360" cy="240" r="14" fill="#121a35" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="560" cy="180" r="14" fill="#121a35" stroke="#9d4edd" stroke-width="2"/>
  <circle cx="680" cy="120" r="18" fill="#00d4ff" filter="url(#glow1)"/>
  <path d="M674 120 L682 120 L678 112 Z" fill="#0a1628"/>
  <!-- Compass -->
  <g transform="translate(200, 130)">
    <circle cx="0" cy="0" r="70" fill="rgba(0,212,255,0.08)" stroke="url(#accent1)" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <polygon points="0,-45 8,0 0,45 -8,0" fill="#00d4ff" opacity="0.9"/>
    <polygon points="0,-45 -8,0 0,0" fill="#9d4edd" opacity="0.7"/>
    <text x="0" y="-58" text-anchor="middle" fill="#00d4ff" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">N</text>
  </g>
  <!-- UI card mock -->
  <rect x="420" y="90" width="280" height="200" rx="12" fill="rgba(18,26,53,0.9)" stroke="rgba(0,212,255,0.35)" stroke-width="1.5"/>
  <rect x="440" y="110" width="120" height="10" rx="5" fill="#00d4ff" opacity="0.7"/>
  <rect x="440" y="135" width="200" height="6" rx="3" fill="#fff" opacity="0.15"/>
  <rect x="440" y="155" width="180" height="6" rx="3" fill="#fff" opacity="0.1"/>
  <rect x="440" y="185" width="100" height="28" rx="6" fill="url(#accent1)" opacity="0.85"/>
  <rect x="550" y="185" width="80" height="28" rx="6" fill="none" stroke="#9d4edd" stroke-width="1.5"/>
  <rect x="440" y="230" width="60" height="40" rx="6" fill="rgba(0,212,255,0.15)"/>
  <rect x="510" y="230" width="60" height="40" rx="6" fill="rgba(157,78,221,0.15)"/>
  <rect x="580" y="230" width="60" height="40" rx="6" fill="rgba(0,212,255,0.1)"/>
  <text x="400" y="355" text-anchor="middle" fill="#8899aa" font-family="Segoe UI, sans-serif" font-size="13" letter-spacing="2">CAREER PATH " AI ROADMAPS</text>
</svg>
