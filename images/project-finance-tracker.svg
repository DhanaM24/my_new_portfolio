<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Personal Finance Tracker">
  <defs>
    <linearGradient id="ft-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d18"/>
      <stop offset="50%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#0f0a28"/>
    </linearGradient>
    <linearGradient id="ft-accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="ft-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ft-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,212,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0.03)"/>
    </linearGradient>
    <filter id="ft-blur">
      <feGaussianBlur stdDeviation="26" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ft-glow">
      <feGaussianBlur stdDeviation="5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#ft-bg)"/>
  <ellipse cx="680" cy="70" rx="130" ry="90" fill="#00d4ff" opacity="0.14" filter="url(#ft-blur)"/>
  <ellipse cx="100" cy="380" rx="110" ry="70" fill="#4ade80" opacity="0.1" filter="url(#ft-blur)"/>
  <!-- Analytics panel -->
  <rect x="70" y="60" width="360" height="280" rx="20" fill="url(#ft-glass)" stroke="rgba(0,212,255,0.35)" stroke-width="1.5"/>
  <rect x="95" y="88" width="130" height="11" rx="5" fill="#00d4ff" opacity="0.85"/>
  <text x="95" y="125" fill="#8899aa" font-family="Segoe UI, sans-serif" font-size="11">SPENDING OVERVIEW</text>
  <!-- Donut -->
  <circle cx="155" cy="210" r="48" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14"/>
  <circle cx="155" cy="210" r="48" fill="none" stroke="#00d4ff" stroke-width="14" stroke-dasharray="110 200" transform="rotate(-90 155 210)" filter="url(#ft-glow)"/>
  <circle cx="155" cy="210" r="48" fill="none" stroke="#4ade80" stroke-width="14" stroke-dasharray="70 240" stroke-dashoffset="-110" transform="rotate(-90 155 210)"/>
  <text x="155" y="218" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">62%</text>
  <!-- Bars -->
  <rect x="250" y="240" width="36" height="75" rx="6" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="1"/>
  <rect x="300" y="200" width="36" height="115" rx="6" fill="rgba(0,212,255,0.35)" stroke="#00d4ff" stroke-width="1"/>
  <rect x="350" y="170" width="36" height="145" rx="6" fill="url(#ft-accent)" opacity="0.75"/>
  <rect x="400" y="215" width="36" height="100" rx="6" fill="rgba(74,222,128,0.25)" stroke="#4ade80" stroke-width="1"/>
  <!-- Phone mockup -->
  <g transform="translate(500, 75)">
    <rect width="200" height="340" rx="28" fill="#080e18" stroke="url(#ft-accent)" stroke-width="2.5"/>
    <rect x="16" y="50" width="168" height="270" rx="14" fill="#0e1628"/>
    <rect x="70" y="28" width="60" height="10" rx="5" fill="#1a2840"/>
    <text x="100" y="95" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700">Rs 24,500</text>
    <text x="100" y="115" text-anchor="middle" fill="#6b7c90" font-family="Segoe UI, sans-serif" font-size="10">Balance</text>
    <polyline points="35,220 60,200 85,208 110,180 135,192 160,168" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="35,220 60,200 85,208 110,180 135,192 160,168 160,270 35,270" fill="url(#ft-fill)"/>
    <rect x="32" y="285" width="136" height="28" rx="8" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <circle cx="48" cy="299" r="7" fill="#4ade80"/>
    <rect x="62" y="293" width="70" height="6" rx="3" fill="#fff" opacity="0.2"/>
  </g>
  <text x="400" y="400" text-anchor="middle" fill="#7a9eb5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="3">FINANCE TRACKER · ANDROID</text>
</svg>
