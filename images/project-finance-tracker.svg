<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Personal Finance Tracker">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#1a0f35"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  <circle cx="650" cy="80" r="100" fill="#4ade80" opacity="0.06"/>
  <circle cx="150" cy="350" r="80" fill="#00d4ff" opacity="0.07"/>
  <!-- Phone mockup -->
  <g transform="translate(480, 55)">
    <rect x="0" y="0" width="160" height="290" rx="22" fill="#0a1220" stroke="url(#accent3)" stroke-width="2.5"/>
    <rect x="12" y="40" width="136" height="230" rx="8" fill="#121a2e"/>
    <rect x="50" y="18" width="60" height="8" rx="4" fill="#1e2a45"/>
    <!-- App header -->
    <rect x="24" y="55" width="80" height="10" rx="5" fill="#00d4ff" opacity="0.8"/>
    <text x="80" y="90" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">Rs 24,500</text>
    <text x="80" y="108" text-anchor="middle" fill="#8899aa" font-family="Segoe UI, sans-serif" font-size="10">Balance</text>
    <!-- Mini chart in phone -->
    <polyline points="30,200 50,185 70,190 90,165 110,175 130,155" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="30,200 50,185 70,190 90,165 110,175 130,155 130,230 30,230" fill="url(#chartFill)"/>
    <!-- Transaction rows -->
    <rect x="28" y="240" width="104" height="22" rx="6" fill="rgba(0,212,255,0.08)"/>
    <circle cx="42" cy="251" r="6" fill="#4ade80" opacity="0.7"/>
    <rect x="54" y="246" width="50" height="5" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="28" y="268" width="104" height="22" rx="6" fill="rgba(157,78,221,0.08)"/>
    <circle cx="42" cy="279" r="6" fill="#f87171" opacity="0.7"/>
    <rect x="54" y="274" width="50" height="5" rx="2" fill="#fff" opacity="0.15"/>
  </g>
  <!-- Large chart panel -->
  <rect x="80" y="70" width="340" height="250" rx="16" fill="rgba(12,20,40,0.9)" stroke="rgba(0,212,255,0.35)" stroke-width="1.5"/>
  <text x="110" y="105" fill="#00d4ff" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">SPENDING OVERVIEW</text>
  <!-- Bar chart -->
  <rect x="120" y="220" width="35" height="70" rx="4" fill="rgba(0,212,255,0.25)" stroke="#00d4ff" stroke-width="1"/>
  <rect x="175" y="180" width="35" height="110" rx="4" fill="rgba(0,212,255,0.4)" stroke="#00d4ff" stroke-width="1"/>
  <rect x="230" y="150" width="35" height="140" rx="4" fill="url(#accent3)" opacity="0.7"/>
  <rect x="285" y="195" width="35" height="95" rx="4" fill="rgba(157,78,221,0.35)" stroke="#9d4edd" stroke-width="1"/>
  <rect x="340" y="170" width="35" height="120" rx="4" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="1"/>
  <!-- Pie slice hint -->
  <circle cx="130" cy="165" r="35" fill="none" stroke="#1e2a45" stroke-width="8"/>
  <circle cx="130" cy="165" r="35" fill="none" stroke="#00d4ff" stroke-width="8" stroke-dasharray="80 140" transform="rotate(-90 130 165)"/>
  <circle cx="130" cy="165" r="35" fill="none" stroke="#4ade80" stroke-width="8" stroke-dasharray="50 170" stroke-dashoffset="-80" transform="rotate(-90 130 165)"/>
  <!-- Wallet icon -->
  <g transform="translate(380, 300)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="15" cy="0" r="8" fill="#00d4ff" opacity="0.6"/>
  </g>
  <text x="400" y="370" text-anchor="middle" fill="#8899aa" font-family="Segoe UI, sans-serif" font-size="13" letter-spacing="2">FINANCE TRACKER " ANDROID</text>
</svg>
